server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/VitaStore?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: VitaStore_JWT_Secret_Key_Change_This_In_Production_2024
    expiration-ms: 86400000 # 24 hours
  admin:
    email: admin@vitastore.com
    password: Admin@123
    full-name: Super Admin
